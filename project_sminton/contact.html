<!DOCTYPE html>
<html lang="en">

<head>
	<title>Contact | Electric Pixel Inn</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Contact Electric Pixel Inn to ask questions, plan your stay, or learn more about our gaming-themed rooms, events, and welcoming community atmosphere.">
	<link rel="stylesheet" href="styles/styles.css">
	<link rel="stylesheet" href="styles/night-mode.css">
</head>

<body>
	<!-- Page container -->
	<div id="wrapper">
	
	<!-- Header -->
	<header>
		<h1><a href="index.html"> <img src="images/electric_pixel_inn_logo.png" alt="Electric Pixel Inn"></a></h1>
		
		<!-- Light switch button -->
		<div class="theme-switch-wrap">
			<button id="themeToggle" class="theme-switch" type="button" aria-label="Enable night mode">
				<img id="switchImage" src="images/white_lightswitch_off.png" alt="Toggle night mode">
			</button>
		</div>	
	</header>
		
	<!-- Navigation -->
	<nav>
		<ul> 
			<!-- Change to the home button/grid in the nav for mobile screens -->
			<li><a href="index.html">Home</a></li>
			<li><a href="the_check_point.html">The Check Point</a></li>
			<li><a href="the_board_room.html">The Board Room</a></li>
			<li><a href="the_lineup.html">The Lineup</a></li>
			<li><a href="contact.html">Contact</a></li>
		</ul>
	</nav>
	
	<!-- Main content -->
	<main>
		<h2>Get in Touch</h2>
  
		<!-- Contact Form -->
		<form method="post" action="https://webdevbasics.net/scripts/demo.php">
			<!-- First Name field -->
			<label for="fName">First Name:</label>
			<input type="text" id="fName" name="fName" required>
			
			<!-- Last Name field -->
			<label for="lName">Last Name:</label>
			<input type="text" id="lName" name="lName" required>
			
			<!-- Email field -->
			<label for="email">Email:</label>
			<input type="email" id="email" name="email" required>
			
			<!-- Reason for Contact Drop-Down -->
			<label for="reason">Reason for Contact:</label>
			<select id="reason" name="reason" required>
				<option value="" disabled selected>Select a reason</option>
				<option>Booking</option>
				<option>Questions</option>
				<option>Events</option>
				<option>Other</option>
			</select>
			
			<!-- Message field -->
			<label for="message">Message:</label>
			<textarea name="message" id="message" rows = "5" cols = "30" required></textarea>
			
			<!-- Submit/Clear Form buttons -->
			<input type="submit" value="Submit">
			<input type="reset" value="Clear Form">
		</form>		
	</main>
	
	<!-- Footer -->
	<footer>
		Copyright &copy; 2026 Electric Pixel Inn | <a href="mailto:sminton21@amarillocollege.com">Steve Minton</a>
	</footer>
	</div>

<script src="js/main.js"></script>

</body>

</html>
